<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciheras Meteorological Station</title>
    
    <style>
        body {
          font-family : Arial, sans-serif;
          margin : 0;
          background-color : #f4f4f4;
        } 
        header{
          background : #333;
          color : white;
          padding : 1rem;
          text-align : left;
        }
        main{
          padding : 20px;
        }.card {
            background : white;
            padding : 15px;
            margin : 10px 0;
            border-radius : 8 px;
            box-shadow : 0 2px 5 px rgba(0,0,0,0.1);
        }
    </style>
  </head>

  <header>
    <h1> Ciheras Meteorological Station</h1>
  </header>
  
  <body>
      <div class="card">
        <h2> Location </h2>

        <div class="content">
          <div class="text">
            <p><strong>Latitude:</strong> -7.7382029°</p>
            <p><strong>Longitude:</strong> 107.9675114°</p>
            <p><strong>Wind speed sensor:</strong> 10.0 and 15.0 meters</p>
            <p><strong>Wind direction sensor:</strong> 15.0 meters</p>
            <p><strong>Site elevation:</strong> 1.0 meter</p>
            <p><strong>Data Sampling:</strong> 1 second</p>
            <p><strong>Data Averaging:</strong> 10 minutes</p>
          </div>
          <iframe
            src="https://www.openstreetmap.org/export/embed.html?bbox=105.0%2C-7.6%2C110.0%2C-7.8&amp;layer=cyclemap&amp;marker=-7.7382029%2C107.9675114"
            width="80%"
            height="400"
            style="border:0;"
            loading="lazy"
            >
          </iframe>
        </div>
      </div>
  </body>
</html>
